---
# .github/workflows/ci.yaml

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # -------------------------------------------------------------------------
  # Lint + format checks
  # -------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          python -m pip install -e .

      - name: Ruff – lint
        run: ruff check customfmt/ tests/

      - name: customfmt – auto-format check
        run: try-auto-format --check customfmt/ tests/

      - name: customfmt – style check
        run: check-format customfmt/ tests/

  # -------------------------------------------------------------------------
  # Tests (matrix across supported Python versions)
  # -------------------------------------------------------------------------
  test:
    name: Tests – Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=customfmt --cov-report=term-missing

  # -------------------------------------------------------------------------
  # Smoke checks for index, resolver, references, and rename planning
  # -------------------------------------------------------------------------
  smoke:
    name: Smoke checks
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install customfmt
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Doctor readiness
        run: customfmt doctor customfmt/ --pretty

      - name: Create index
        run: create-index customfmt/ --pretty

      - name: Resolve index
        run: resolve-index customfmt/ --pretty

      - name: Project refs smoke
        run: customfmt refs customfmt/ --name ResolveFile --pretty

      - name: Rename-symbol diff smoke
        run: customfmt rename-symbol customfmt/ --name ResolveFile --to ResolvePath --diff
