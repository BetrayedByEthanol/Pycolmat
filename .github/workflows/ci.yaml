---
# .github/workflows/ci.yaml

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # -------------------------------------------------------------------------
  # Lint + format checks
  # -------------------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install .

      - name: Ruff – lint
        run: ruff check customfmt/ tests/

      - name: Ruff – format check
        run: ruff format --check customfmt/ tests/

      - name: customfmt – auto-format check
        run: try-auto-format --check customfmt/ tests/

      - name: customfmt – style check (CF001–CF010)
        run: check-format customfmt/ tests/

  # -------------------------------------------------------------------------
  # Tests (matrix across supported Python versions)
  # -------------------------------------------------------------------------
  test:
    name: Tests – Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pytest pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=customfmt --cov-report=term-missing

  # -------------------------------------------------------------------------
  # customfmt self-check: the tool must pass its own rules
  # -------------------------------------------------------------------------
  selfcheck:
    name: customfmt self-check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install customfmt
        run: pip install .

      - name: Auto-format check (customfmt source)
        run: try-auto-format --check customfmt/ tests/

      - name: Style check (customfmt source)
        run: check-format customfmt/ tests/
